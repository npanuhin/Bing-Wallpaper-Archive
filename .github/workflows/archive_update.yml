name: Archive update

on:
  schedule:
#    - cron: '2 8 * * *'  # 8:02 UTC
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "archive_update"
  cancel-in-progress: false

jobs:
  update-archive:
    name: Update images
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14

      - name: Cache Python dependencies
        uses: actions/cache@v5
        id: cache-python
        with:
          path: src/venv
          key: ${{ runner.os }}-venv-${{ hashFiles('src/requirements.txt') }}

      - name: Install Python dependencies
        if: steps.cache-python.outputs.cache-hit != 'true'
        working-directory: src
        run: |
          python -m venv venv
          venv/bin/pip install -r requirements.txt

      - name: Add Python venv to PATH
        working-directory: src
        run: echo "${GITHUB_WORKSPACE}/src/venv/bin" >> "$GITHUB_PATH"

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache Node.js dependencies
        uses: actions/cache@v5
        id: cache-node
        with:
          path: src/website/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('src/website/package-lock.json') }}

      - name: Install Node.js dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        working-directory: src/website
        run: npm ci

      # ----------------------------------------------------------------------------------------------------------------

      - name: Update archive
        working-directory: src
        run: python bing.py
        env:
          CLOUDFLARE_ACCOUNT_ID: '${{ secrets.CLOUDFLARE_ACCOUNT_ID }}'
          CLOUDFLARE_R2_ACCESS_KEY_ID: '${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}'
          CLOUDFLARE_R2_API_TOKEN: '${{ secrets.CLOUDFLARE_R2_API_TOKEN }}'

      # ----------------------------------------------------------------------------------------------------------------

      - name: Build website
        working-directory: src/website
        run: npm run build

      - name: Deploy website
        working-directory: src/website
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ----------------------------------------------------------------------------------------------------------------

      - name: Update README
        working-directory: src
        run: python update_readme.py
        env:
          CLOUDFLARE_ACCOUNT_ID: '${{ secrets.CLOUDFLARE_ACCOUNT_ID }}'
          CLOUDFLARE_R2_ACCESS_KEY_ID: '${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}'
          CLOUDFLARE_R2_API_TOKEN: '${{ secrets.CLOUDFLARE_R2_API_TOKEN }}'

#      - name: Get previous commit author
#        id: previous_commit
#        run: echo "PREVIOUS_COMMIT_AUHOUR=$(git log -1 --pretty=%an)" >> "$GITHUB_OUTPUT"
#
#      - name: Commit and push changes (amend previous update)
#        if: ${{ steps.previous_commit.outputs.PREVIOUS_COMMIT_AUHOUR == 'GitHub Actions' }}
#        uses: stefanzweifel/git-auto-commit-action@v7
#        with:
#          commit_message: Archive update
#          commit_user_name: GitHub Actions
#          commit_author: GitHub Actions <41898282+github-actions[bot]@users.noreply.github.com>
#          file_pattern: 'api/* README.md'
#          commit_options: --amend --no-edit
#          push_options: --force
#          skip_fetch: true

      - name: Commit and push changes
#        if: ${{ steps.previous_commit.outputs.PREVIOUS_COMMIT_AUHOUR != 'GitHub Actions' }}
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: Archive update
          commit_user_name: GitHub Actions
          commit_author: GitHub Actions <41898282+github-actions[bot]@users.noreply.github.com>
          file_pattern: 'api/* README.md'
