name: Available regions check

on:
  schedule:
    - cron: '22 8 * * *'  # 8:22 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Check available regions
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14
          cache: 'pip'
          cache-dependency-path: src/requirements.txt

      - name: Install Python dependencies
        working-directory: src
        run: pip install -r requirements.txt

      - name: Check regions
        working-directory: src/scripts
        run: python get_regions.py

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=⚠️ <b>Bing regions outdated</b> — update src/Region.py%0A<a href=\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\">View run</a>"
